server:
  port: 8080
  address: 127.0.0.1

spring:
  datasource:
    url: jdbc:h2:file:/opt/sqlbotai/data/sqldb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ${DB_PASSWORD:}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  thymeleaf:
    cache: true

logging:
  level:
    com.sqlbot: INFO
    org.springframework.web: WARN
  file:
    name: /opt/sqlbotai/logs/sqlbotai.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  enabled: true

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  enabled: true

rag:
  enabled: true
  vector-store: dashscope
  rebuild-on-startup: true
  cache-dir: /opt/sqlbotai/data/rag-cache

query-business-data:
  enabled: true
  connection-mode: local
  python-path: python3
  output-dir: /opt/sqlbotai/data/query-results
  mysql-config: /opt/sqlbotai/config/mysql.cnf
  database: ADS
  max-rows: 500
  timeout-ms: 30000
